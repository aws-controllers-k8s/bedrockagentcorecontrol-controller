ignore:
  resource_names:
    # AgentRuntime
    # AgentRuntimeEndpoint
    - ApiKeyCredentialProvider
    - Browser
    - BrowserProfile
    - CodeInterpreter
    - Evaluator
    - Gateway
    - GatewayTarget
    # - Memory
    - Oauth2CredentialProvider
    - OnlineEvaluationConfig
    - Policy
    - PolicyEngine
    # - WorkloadIdentity
  field_paths:
    - CreateAgentRuntimeInput.ClientToken
    - CreateAgentRuntimeEndpointInput.ClientToken
    - CreateMemoryInput.ClientToken
    - UpdateMemoryInput.ClientToken
    - DeleteMemoryInput.ClientToken
    - UpdateMemoryInput.MemoryStrategies

sdk_names:
  model_name: bedrock-agentcore-control

operations:
  CreateMemory:
    output_wrapper_field_path: Memory
  GetMemory:
    output_wrapper_field_path: Memory
  UpdateMemory:
    output_wrapper_field_path: Memory

resources:
  AgentRuntime:
    exceptions:
      terminal_codes:
        - ValidationException
    hooks:
      sdk_read_one_post_set_output:
        template_path: hooks/agentruntime/sdk_read_one_post_set_output.go.tpl
      sdk_update_pre_build_request:
        template_path: hooks/agentruntime/sdk_update_pre_build_request.go.tpl

  AgentRuntimeEndpoint:
    renames:
      operations:
        GetAgentRuntimeEndpoint:
          input_fields:
            EndpointName: Name
        CreateAgentRuntimeEndpoint:
          input_fields:
            EndpointName: Name
        DeleteAgentRuntimeEndpoint:
          input_fields:
            EndpointName: Name
    fields:
      Name:
        is_primary_key: true
    hooks:
      sdk_read_one_post_set_output:
        template_path: hooks/agentruntimeendpoint/sdk_read_one_post_set_output.go.tpl
      sdk_update_pre_build_request:
        template_path: hooks/agentruntimeendpoint/sdk_update_pre_build_request.go.tpl

  Memory:
    renames:
      operations:
        GetMemory:
          input_fields:
            MemoryId: Id
        UpdateMemory:
          input_fields:
            MemoryId: Id
        DeleteMemory:
          input_fields:
            MemoryId: Id
    fields:
      Id:
        is_primary_key: true
      Name:
        is_immutable: true
      EncryptionKeyArn:
        is_immutable: true
      CreatedAt:
        is_read_only: true
        from:
          operation: GetMemory
          path: Memory.CreatedAt
      UpdatedAt:
        is_read_only: true
        from:
          operation: GetMemory
          path: Memory.UpdatedAt
      FailureReason:
        is_read_only: true
        from:
          operation: GetMemory
          path: Memory.FailureReason
      Strategies:
        is_read_only: true
        from:
          operation: GetMemory
          path: Memory.Strategies
    synced:
      when:
        - path: Status.Status
          in:
            - ACTIVE
            - FAILED
    exceptions:
      errors:
        404:
          code: ResourceNotFoundException
      terminal_codes:
        - ValidationException
    hooks:
      sdk_read_one_post_set_output:
        template_path: hooks/memory/sdk_read_one_post_set_output.go.tpl
      sdk_update_pre_build_request:
        template_path: hooks/memory/sdk_update_pre_build_request.go.tpl
      sdk_delete_pre_build_request:
        template_path: hooks/memory/sdk_delete_pre_build_request.go.tpl

  WorkloadIdentity:
    fields:
      Name:
        is_primary_key: true
        is_immutable: true
      CreatedTime:
        is_read_only: true
        from:
          operation: GetWorkloadIdentity
          path: CreatedTime
      LastUpdatedTime:
        is_read_only: true
        from:
          operation: GetWorkloadIdentity
          path: LastUpdatedTime
    exceptions:
      errors:
        404:
          code: ResourceNotFoundException
      terminal_codes:
        - ValidationException
    hooks:
      sdk_read_one_post_set_output:
        template_path: hooks/workloadidentity/sdk_read_one_post_set_output.go.tpl
      sdk_update_pre_build_request:
        template_path: hooks/workloadidentity/sdk_update_pre_build_request.go.tpl