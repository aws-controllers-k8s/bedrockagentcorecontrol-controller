apiVersion: bedrockagentcorecontrol.services.k8s.aws/v1alpha1
kind: APIKeyCredentialProvider
metadata:
  name: $API_KEY_CREDENTIAL_PROVIDER_NAME
  namespace: default
spec:
  name: $API_KEY_CREDENTIAL_PROVIDER_NAME
  apiKey:
    name: $API_KEY_SECRET_NAME
    namespace: default
    key: api-key
  tags:
    Environment: development
    Team: ack-test
    ToBeRemoved: temporary
