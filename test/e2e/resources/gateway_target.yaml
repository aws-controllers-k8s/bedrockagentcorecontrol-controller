apiVersion: bedrockagentcorecontrol.services.k8s.aws/v1alpha1
kind: GatewayTarget
metadata:
  name: $GATEWAY_TARGET_NAME
  namespace: default
spec:
  name: $GATEWAY_TARGET_NAME
  description: "ACK e2e test gateway target"
  gatewayIdentifier: $GATEWAY_ID
  credentialProviderConfigurations:
    - credentialProviderType: GATEWAY_IAM_ROLE
  targetConfiguration:
    mcp:
      smithyModel:
        inlinePayload: '$SMITHY_MODEL_PAYLOAD'