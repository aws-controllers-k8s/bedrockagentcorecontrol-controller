ignore:
  resource_names:
    # AgentRuntime
    # AgentRuntimeEndpoint
    - ApiKeyCredentialProvider
    - Browser
    - BrowserProfile
    - CodeInterpreter
    - Evaluator
    # Gateway
    # - GatewayTarget
    - Memory
    - Oauth2CredentialProvider
    - OnlineEvaluationConfig
    - Policy
    - PolicyEngine
    # - WorkloadIdentity

  field_paths:
    # SchemaDefinition shape used by InputSchema/OutputSchema recursively
    # references itself via Items and Properties. We ignore the entire
    # InputSchema and OutputSchema fields and re-add them as string fields
    # that accept JSON, so users can represent the full recursive schema.
    - CreateGatewayTargetInput.TargetConfiguration.Mcp.Lambda.ToolSchema.InlinePayload.ToolDefinition.InputSchema
    - CreateGatewayTargetInput.TargetConfiguration.Mcp.Lambda.ToolSchema.InlinePayload.ToolDefinition.OutputSchema
    - CreateAgentRuntimeInput.ClientToken
    - CreateAgentRuntimeEndpointInput.ClientToken
    - CreateGatewayInput.ClientToken

sdk_names:
  model_name: bedrock-agentcore-control

resources:
  AgentRuntime:
    exceptions:
      terminal_codes:
        - ValidationException
    hooks:
      sdk_read_one_post_set_output:
        template_path: hooks/agentruntime/sdk_read_one_post_set_output.go.tpl
      sdk_update_pre_build_request:
        template_path: hooks/agentruntime/sdk_update_pre_build_request.go.tpl

  AgentRuntimeEndpoint:
    renames:
      operations:
        GetAgentRuntimeEndpoint:
          input_fields:
            EndpointName: Name
        CreateAgentRuntimeEndpoint:
          input_fields:
            EndpointName: Name
        DeleteAgentRuntimeEndpoint:
          input_fields:
            EndpointName: Name
    fields:
      Name:
        is_primary_key: true
    hooks:
      sdk_read_one_post_set_output:
        template_path: hooks/agentruntimeendpoint/sdk_read_one_post_set_output.go.tpl
      sdk_update_pre_build_request:
        template_path: hooks/agentruntimeendpoint/sdk_update_pre_build_request.go.tpl

  WorkloadIdentity:
    fields:
      Name:
        is_primary_key: true
        is_immutable: true
      CreatedTime:
        is_read_only: true
        from:
          operation: GetWorkloadIdentity
          path: CreatedTime
      LastUpdatedTime:
        is_read_only: true
        from:
          operation: GetWorkloadIdentity
          path: LastUpdatedTime
    exceptions:
      errors:
        404:
          code: ResourceNotFoundException
      terminal_codes:
        - ValidationException
    hooks:
      sdk_read_one_post_set_output:
        template_path: hooks/workloadidentity/sdk_read_one_post_set_output.go.tpl
      sdk_update_pre_build_request:
        template_path: hooks/workloadidentity/sdk_update_pre_build_request.go.tpl

  Gateway:
    renames:
      operations:
        GetGateway:
          input_fields:
            GatewayIdentifier: GatewayId
        UpdateGateway:
          input_fields:
            GatewayIdentifier: GatewayId
        DeleteGateway:
          input_fields:
            GatewayIdentifier: GatewayId
    fields:
      KmsKeyArn:
        references:
          resource: Key
          path: Status.ACKResourceMetadata.ARN
          service_name: kms
      RoleArn:
        references:
          resource: Role
          path: Status.ACKResourceMetadata.ARN
          service_name: iam
    synced:
      when:
        - path: Status.Status
          in:
            - READY
    hooks:
      sdk_update_pre_build_request:
        template_path: hooks/gateway/sdk_update_pre_build_request.go.tpl
      sdk_read_one_post_set_output:
        template_path: hooks/gateway/sdk_read_one_post_set_output.go.tpl
      sdk_delete_pre_build_request:
        template_path: hooks/gateway/sdk_delete_pre_build_request.go.tpl
      sdk_delete_post_request:
        template_path: hooks/gateway/sdk_delete_post_request.go.tpl
    exceptions:
      errors:
        404:
          code: ResourceNotFoundException
      terminal_codes:
        - ValidationException
  GatewayTarget:
    ignore_idempotency_token: true
    fields:
      TargetId:
        is_primary_key: true

      GatewayIdentifier:
        references:
          resource: Gateway
          path: Status.GatewayID

      LastSynchronizedAt:
        is_read_only: true
        from:
          operation: GetGatewayTarget
          path: LastSynchronizedAt

      UpdatedAt:
        is_read_only: true
        from:
          operation: GetGatewayTarget
          path: UpdatedAt
      
      TargetConfiguration.Mcp.ApiGateway.RestApiId:
        references:
          resource: RestAPI
          service_name: apigateway
          path: Status.ID
      
      TargetConfiguration.Mcp.Lambda.ToolSchema.InlinePayload:
        # explictly don't update this value from API response to avoid
        # tool definitions from erroneously having InputSchema and OutputSchema removed.
        set:
          - method: Create
            ignore: from
          - method: Update
            ignore: from
            
        # The InlinePayload slice contains ToolDefinition elements whose
        # InputSchema and OutputSchema fields are JSON strings representing
        # recursive SchemaDefinition objects. We ignore the entire slice in
        # the generated delta comparison and handle it in a delta_pre_compare
        # hook that normalizes JSON before comparing.
        compare:
          is_ignored: true
      # InputSchema and OutputSchema use the recursive SchemaDefinition type
      # which can't be directly represented in a CRD. We accept them as JSON
      # strings and marshal/unmarshal in hooks.
      TargetConfiguration.Mcp.Lambda.ToolSchema.InlinePayload.InputSchema:
        type: "string"
        set:
          - method: Create
            ignore: all
          - method: Update
            ignore: all
          - method: ReadOne
            ignore: all
      TargetConfiguration.Mcp.Lambda.ToolSchema.InlinePayload.OutputSchema:
        type: "string"
        set:
          - method: Create
            ignore: all
          - method: Update
            ignore: all
          - method: ReadOne
            ignore: all

    # https://docs.aws.amazon.com/bedrock-agentcore-control/latest/APIReference/API_TagResource.html
    # Tags not supported for GatewayTargets
    tags:
      ignore: true
    synced:
      when:
        - path: Status.Status
          in:
            - READY
    hooks:
      delta_pre_compare:
        template_path: hooks/gateway_target/delta_pre_compare.go.tpl
      sdk_create_post_build_request:
        template_path: hooks/gateway_target/sdk_create_post_build_request.go.tpl
      sdk_create_post_set_output:
        template_path: hooks/gateway_target/sdk_create_post_set_output.go.tpl
      sdk_update_post_build_request:
        template_path: hooks/gateway_target/sdk_update_post_build_request.go.tpl
      sdk_update_post_set_output:
        template_path: hooks/gateway_target/sdk_update_post_set_output.go.tpl
      sdk_read_one_post_set_output:
        template_path: hooks/gateway_target/sdk_read_one_post_set_output.go.tpl
    exceptions:
      errors:
        404:
          code: ResourceNotFoundException
      terminal_codes:
        - ValidationException
